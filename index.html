<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador Léxico — Calculadora Simples</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Raleway:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>

<body>

    <!-- ═══ Navigation Rail (lateral) ═══ -->
    <nav class="nav-rail">
        <div class="nav-rail-header"></div>
        <div class="nav-rail-items">
            <button class="nav-item active" data-tab="tabTokenizar" title="Analisador Léxico">
                <div class="nav-indicator">
                    <span class="material-symbols-rounded">code</span>
                </div>
                <span class="nav-label">Analisador Léxico</span>
            </button>
        </div>
    </nav>

    <!-- ═══ Conteúdo principal ═══ -->
    <main class="main-content">

        <!-- ═══ Aba 1: Tokenizar ═══ -->
        <section id="tabTokenizar" class="tab-panel active">

            <!-- Editor de Código -->
            <div class="editor-card">
                <div class="editor-toolbar">
                    <div class="toolbar-title">
                        <span class="material-symbols-rounded">edit_note</span>
                        <span>Editor de Expressão</span>
                    </div>
                    <div class="toolbar-actions">
                        <button id="btnLimpar" class="toolbar-btn" title="Limpar">
                            <span class="material-symbols-rounded">delete</span>
                        </button>
                        <button id="btnTokenizar" class="toolbar-btn primary" title="Tokenizar">
                            <span class="material-symbols-rounded">play_arrow</span>
                            <span>Compilar</span>
                        </button>
                    </div>
                </div>
                <div class="editor-body">
                    <div class="line-numbers" id="lineNumbers">1</div>
                    <textarea id="inputExpr" class="code-editor"
                        placeholder="Digite a expressão aqui...&#10;Ex.: 3.2 + (2 * 12.01)"
                        spellcheck="false"></textarea>
                </div>
            </div>

            <!-- Painel inferior: Erros + Tokens -->
            <div class="output-panel">
                <div class="output-tabs">
                    <button class="output-tab active" data-output="outputTokens">
                        <span class="material-symbols-rounded">token</span>
                        Tokens
                        <span class="badge" id="tokenCount">0</span>
                    </button>
                    <button class="output-tab" data-output="outputErros">
                        <span class="material-symbols-rounded">error</span>
                        Erros
                        <span class="badge error" id="errorCount">0</span>
                    </button>
                </div>
                <div id="outputTokens" class="output-content active">
                    <div id="resultArea" class="token-chips-area">
                        <p class="empty-state">
                            <span class="material-symbols-rounded">info</span>
                            Pressione <strong>Compilar</strong> para analisar a expressão
                        </p>
                    </div>
                </div>
                <div id="outputErros" class="output-content">
                    <div id="errorArea" class="error-list"></div>
                </div>
            </div>

        </section>

    </main>

</body>

</html>
